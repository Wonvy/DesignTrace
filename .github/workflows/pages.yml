name: Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm run check
      - run: npm run build:standalone

      - name: Prepare GitHub Pages site
        run: |
          mkdir -p _site
          cp dist/DesignTrace.html _site/index.html
          cp dist/DesignTrace.html _site/DesignTrace.html
          touch _site/.nojekyll

      - name: Sync root HTML for jsDelivr CDN
        run: cp dist/DesignTrace.html DesignTrace.html

      - name: Commit CDN copy
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync DesignTrace.html for CDN [skip ci]"
          file_pattern: DesignTrace.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
