<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DesignTrace</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">DT</span>
          <span>DesignTrace</span>
        </div>

        <input id="searchInput" class="search" type="search" placeholder="搜索作品、路径、类型" />

        <div class="toolbar">
          <select id="sortSelect" aria-label="排序">
            <option value="lastActiveAt">最近活跃</option>
            <option value="createdAt">起始时间</option>
            <option value="modifiedAt">修改时间</option>
            <option value="name">名称</option>
            <option value="sizeBytes">大小</option>
          </select>
          <button id="pickDirectoryButton" type="button">选择文件夹</button>
          <button id="rescanButton" type="button">重新扫描</button>
          <button id="themeButton" class="icon-button" type="button" aria-label="切换主题">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3.75V2m0 20v-1.75M4.58 4.58 3.34 3.34m17.32 17.32-1.24-1.24M3.75 12H2m20 0h-1.75M4.58 19.42l-1.24 1.24M20.66 3.34l-1.24 1.24" />
              <circle cx="12" cy="12" r="4.2" />
            </svg>
          </button>
        </div>
      </header>

      <main class="showcase" aria-live="polite">
        <button id="prevButton" class="nav-arrow nav-arrow-left" type="button" aria-label="上一件作品">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14.5 7.5 9 12l5.5 4.5" />
          </svg>
        </button>
        <button id="nextButton" class="nav-arrow nav-arrow-right" type="button" aria-label="下一件作品">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9.5 7.5 15 12l-5.5 4.5" />
          </svg>
        </button>

        <div id="slideshowStage" class="slideshow-stage">
          <section id="heroArtwork" class="hero-artwork"></section>
          <aside id="heroThumbs" class="hero-thumbs" aria-label="项目第一层文件列表" hidden></aside>
        </div>

        <div id="scanOverlay" class="scan-overlay" aria-live="polite">
          <div class="scan-orbit" aria-hidden="true"></div>
          <div>
            <strong>正在扫描</strong>
            <span id="scanText">读取本地项目结构...</span>
          </div>
        </div>
      </main>

      <div id="splitter" class="splitter" role="separator" aria-orientation="horizontal" aria-label="调整上下区域高度"></div>

      <section class="timeline-panel">
        <div class="timeline-top">
          <div class="timeline-period-filter">
            <select id="timelineYearSelect" class="timeline-period-select" aria-label="年份" disabled>
              <option value="">年份</option>
            </select>
            <select id="timelineMonthSelect" class="timeline-period-select" aria-label="月份" disabled>
              <option value="">月份</option>
            </select>
          </div>
          <section class="project-info" aria-live="polite">
            <h1 id="heroTitle" class="project-title">选择文件夹开始</h1>
            <p class="project-detail">
              <span id="heroKicker" class="project-kicker">DesignTrace</span><span id="heroMeta" class="project-meta">本地读取，未上传。</span>
            </p>
          </section>
          <div class="timeline-header">
            <div class="timeline-tools">
              <select id="scopeFilterSelect" class="scope-filter" aria-label="范围筛选">
                <option value="all">全部</option>
                <option value="sameParent">同父文件夹</option>
                <option value="sameRoot">同根目录</option>
                <option value="topLevel">仅顶层</option>
                <option value="nested">仅子文件夹</option>
              </select>
              <div id="extFilter" class="ext-filter">
                <button
                  id="extFilterTrigger"
                  class="ext-filter-trigger scope-filter"
                  type="button"
                  aria-label="后缀筛选，可多选"
                  aria-haspopup="listbox"
                  aria-expanded="false"
                  aria-controls="extFilterPanel"
                >
                  全部后缀
                </button>
                <div id="extFilterPanel" class="ext-filter-panel" role="listbox" aria-multiselectable="true">
                  <div id="extFilterMenu" class="ext-filter-menu"></div>
                </div>
              </div>
              <select id="sizeFilterSelect" class="scope-filter" aria-label="图片大小筛选">
                <option value="all">全部大小</option>
                <option value="hideSmall">隐藏小图</option>
                <option value="medium">≥512KB</option>
                <option value="large">≥2MB</option>
              </select>
              <button id="autoplayButton" class="play-button" type="button" aria-label="播放时间轴">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path class="play-icon" d="M9 7.5v9l7-4.5-7-4.5Z" />
                  <path class="pause-icon" d="M8 7h2.8v10H8zM13.2 7H16v10h-2.8z" />
                </svg>
                <span>播放</span>
              </button>
            </div>
          </div>
        </div>
        <div class="timeline-body">
          <div id="timeline" class="timeline" tabindex="0"></div>
          <aside id="heatmapPanel" class="heatmap-panel" aria-label="项目活跃热力图">
            <button
              id="heatmapToggle"
              class="heatmap-toggle"
              type="button"
              aria-label="折叠热力图"
              aria-expanded="true"
              aria-controls="heatmap"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14.5 7.5 9 12l5.5 4.5" />
              </svg>
            </button>
            <div class="heatmap-panel-body">
              <div class="heatmap-nav">
                <select id="heatmapYearSelect" class="heatmap-nav-select" aria-label="年份" disabled></select>
                <div class="heatmap-month-nav">
                  <button id="heatmapPrevMonth" class="heatmap-nav-arrow" type="button" aria-label="上个月" disabled>
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14.5 7.5 9 12l5.5 4.5" /></svg>
                  </button>
                  <select id="heatmapMonthSelect" class="heatmap-nav-select" aria-label="月份" disabled></select>
                  <button id="heatmapNextMonth" class="heatmap-nav-arrow" type="button" aria-label="下个月" disabled>
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.5 7.5 15 12l-5.5 4.5" /></svg>
                  </button>
                </div>
              </div>
              <div id="heatmap" class="heatmap" role="application" aria-label="按月浏览项目活动日历"></div>
            </div>
          </aside>
        </div>
        <div id="heatmapTooltip" class="heatmap-tooltip" role="tooltip" hidden></div>
      </section>

      <footer class="statusbar" aria-live="polite">
        <div class="statusbar-fields">
          <div id="statusPath" class="status-cell status-path">选择一个文件夹，开始留下创作轨迹。</div>
          <div id="statusFile" class="status-cell status-file"></div>
          <div id="statusStats" class="status-cell status-stats"></div>
          <div id="statusDates" class="status-cell status-dates"></div>
        </div>
        <div id="statusSliderCell" class="status-slider" hidden>
          <span class="status-slider-label">缩放</span>
          <input id="statusSlider" type="range" min="0" max="100" value="13" step="1" aria-label="时间轴缩放" disabled />
          <span id="statusSliderValue" class="status-slider-value" aria-hidden="true">100%</span>
        </div>
      </footer>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
