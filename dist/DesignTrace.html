* {
  box-sizing: border-box;
  scrollbar-width: thin;
  scrollbar-color: color-mix(in srgb, var(--accent) 42%, transparent) transparent;
}

html {
  height: 100%;
  overflow: hidden;
}

body {
  margin: 0;
  min-width: 1080px;
  height: 100%;
  overflow: hidden;
  background:
    radial-gradient(ellipse 120% 70% at 50% -18%, color-mix(in srgb, var(--accent) 5%, transparent), transparent 58%),
    var(--bg);
  color: var(--ink);
  transition: background-color 260ms ease, color 260ms ease;
}

*::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

*::-webkit-scrollbar-track {
  background: transparent;
}

*::-webkit-scrollbar-thumb {
  border: 2px solid transparent;
  border-radius: 999px;
  background: color-mix(in srgb, var(--muted) 34%, transparent);
  background-clip: padding-box;
}

*::-webkit-scrollbar-thumb:hover {
  background: color-mix(in srgb, var(--accent) 58%, var(--muted));
  background-clip: padding-box;
}

*::-webkit-scrollbar-thumb:active {
  background: var(--accent);
  background-clip: padding-box;
}

*::-webkit-scrollbar-corner {
  background: transparent;
}

button,
input,
select {

}

button,
select,
input {
  border: 1px solid var(--line);
  background: var(--control-bg);
  color: var(--ink);
  border-radius: 999px;
  transition: background-color 220ms ease, border-color 220ms ease, color 220ms ease, box-shadow 180ms ease, transform 180ms ease;
}

button {
  height: 36px;
  padding: 0 14px;
  cursor: pointer;
  transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease, background 180ms ease;
}

button:hover {
  border-color: var(--accent);
  box-shadow: var(--accent-shadow);
  transform: translateY(-1px);
}

.icon-button {
  width: 36px;
  padding: 0;
  display: grid;
  place-items: center;
}

.icon-button svg {
  width: 17px;
  height: 17px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.7;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.play-button {
  display: inline-flex;
  align-items: center;
  gap: 7px;
}

.play-button svg {
  width: 15px;
  height: 15px;
  fill: currentColor;
}

.play-button .play-icon,
.play-button .pause-icon {
  fill: currentColor;
}

.play-button .pause-icon {
  display: none;
}

.play-button.playing .play-icon {
  display: none;
}

.play-button.playing .pause-icon {
  display: block;
}

.timeline-autoplay-button,
.timeline-slideshow-fullscreen-button {
  display: grid;
  place-items: center;
  width: var(--project-info-height);
  min-width: var(--project-info-height);
  max-width: var(--project-info-height);
  height: var(--project-info-height);
  padding: 0;
  gap: 0;
  border: none;
  border-radius: 0;
  background: transparent;
  box-shadow: none;
  color: var(--muted);
  transform: none;
}

.timeline-autoplay-button:hover,
.timeline-slideshow-fullscreen-button:hover:not(:disabled) {
  color: var(--ink);
  background: transparent;
  border: none;
  box-shadow: none;
  transform: none;
}

.timeline-autoplay-button:focus-visible,
.timeline-slideshow-fullscreen-button:focus-visible {
  outline: 2px solid color-mix(in srgb, var(--accent) 45%, transparent);
  outline-offset: 2px;
}

.timeline-autoplay-button svg {
  width: 22px;
  height: 22px;
}

.timeline-slideshow-fullscreen-button svg {
  width: 22px;
  height: 22px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.timeline-slideshow-fullscreen-button.is-active {
  color: var(--accent);
}

.timeline-slideshow-fullscreen-button:disabled {
  opacity: 0.35;
  cursor: default;
}

.timeline-tools .timeline-autoplay-button:hover,
.timeline-tools .timeline-slideshow-fullscreen-button:hover:not(:disabled) {
  border: none;
  background: transparent;
  box-shadow: none;
  transform: none;
}

#pickDirectoryButton {
  position: relative;
}

#pickDirectoryButton::after {
  content: attr(data-tooltip);
  position: absolute;
  z-index: 20;
  right: 0;
  top: calc(100% + 10px);
  width: max-content;
  max-width: 360px;
  padding: 9px 11px;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: var(--surface-raised);
  box-shadow: var(--shadow-popover);
  color: var(--ink);
  font-size: 12px;
  line-height: 1.55;
  opacity: 0;
  pointer-events: none;
  transform: translateY(-3px);
  transition: opacity 160ms ease, transform 160ms ease;
  white-space: normal;
}

#pickDirectoryButton:hover::after {
  opacity: 1;
  transform: translateY(0);
}

input,
select {
  height: 36px;
  padding: 0 12px;
}

.app-shell {
  position: relative;
  display: grid;
  grid-template-rows: 60px 1fr 10px var(--timeline-height) var(--statusbar-height);
  height: 100%;
  max-height: 100vh;
  min-height: 0;
  overflow: hidden;
}

.app-shell.is-scanning::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 14;
  background: var(--scan-dim);
  pointer-events: auto;
  transition: opacity 220ms ease;
}

.app-shell.is-scanning > .topbar,
.app-shell.is-scanning > .showcase,
.app-shell.is-scanning > .splitter,
.app-shell.is-scanning > .timeline-panel,
.app-shell.is-scanning > .statusbar {
  pointer-events: none;
  user-select: none;
}

.app-shell.is-slideshow-fullscreen > .topbar,
.app-shell.is-slideshow-fullscreen > .splitter,
.app-shell.is-slideshow-fullscreen > .timeline-panel,
.app-shell.is-slideshow-fullscreen > .statusbar {
  display: none !important;
}

.app-shell.is-slideshow-fullscreen > .showcase {
  position: fixed;
  inset: 0;
  z-index: 30;
  display: flex;
  flex-direction: column;
  height: 100%;
  width: 100%;
  min-height: 0;
  padding: 0;
  margin: 0;
  background: var(--bg);
}

.app-shell.is-slideshow-fullscreen .showcase-layout,
.app-shell.is-slideshow-fullscreen .slideshow-column,
.app-shell.is-slideshow-fullscreen .slideshow-stage,
.app-shell.is-slideshow-fullscreen .hero-artwork {
  flex: 1 1 auto;
  width: 100%;
  height: 100%;
  min-height: 0;
  min-width: 0;
}

.app-shell.is-slideshow-fullscreen .showcase-layout {
  grid-template-columns: minmax(0, 1fr);
}

.app-shell.is-slideshow-fullscreen .nav-arrow,
.app-shell.is-slideshow-fullscreen .hero-files-panel,
.app-shell.is-slideshow-fullscreen .scan-overlay {
  display: none !important;
}

.app-shell.is-slideshow-fullscreen .hero-artwork {
  background: var(--bg);
  animation: none;
}

.app-shell.is-slideshow-fullscreen .art-image {
  max-width: 100vw;
  max-height: 100vh;
}

html.is-slideshow-fullscreen,
html.is-slideshow-fullscreen body {
  overflow: hidden;
}

.topbar {
  z-index: 5;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 16px;
  padding: 12px 28px 10px;
  border-bottom: 1px solid var(--line);
  background: var(--chrome-bg);
  font-size: 12px;
}

.brand {
  grid-column: 1;
  justify-self: start;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 700;
}

.brand-mark {
  display: grid;
  place-items: center;
  width: 28px;
  height: 28px;
  border: 1px solid var(--line-strong);
  border-radius: 50%;
  color: var(--accent);
  font-size: 10px;
}

.brand-version {
  color: var(--muted);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.01em;
}

.toolbar {
  grid-column: 3;
  justify-self: end;
  display: flex;
  align-items: center;
  gap: 6px;
}

.topbar button {
  height: 30px;
  padding: 0 11px;
  font-size: 14px;
}

.topbar .icon-button {
  width: 30px;
  padding: 0;
}

.topbar .icon-button svg {
  width: 14px;
  height: 14px;
}

.topbar input,
.topbar select {
  height: 30px;
  padding: 0 10px;
  font-size: 14px;
}

.search {
  grid-column: 2;
  justify-self: center;
  width: min(320px, 42vw);
}

.directory-input {
  display: none;
}

.showcase {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  min-height: 0;
  height: 100%;
  padding: 0 28px;
  box-sizing: border-box;
}

.showcase-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  gap: 12px;
  flex: 1;
  width: 100%;
  min-height: 0;
  height: 100%;
  align-self: stretch;
}

.showcase-layout.has-files-panel {
  grid-template-columns: minmax(0, 1fr) minmax(260px, 36%);
}

.slideshow-column {
  position: relative;
  min-width: 0;
  min-height: 0;
  height: 100%;
  width: 100%;
}

.slideshow-stage {
  width: 100%;
  height: 100%;
  min-height: 0;
}

.hero-artwork {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  min-height: 0;
  overflow: hidden;
  background: transparent;
  border: none;
  box-shadow: none;
  transform: translateY(0);
  animation: heroIn 520ms cubic-bezier(0.22, 1, 0.36, 1);
}

.hero-artwork.is-loading {
  background: var(--soft-fill);
}

.hero-spinner {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 3px solid color-mix(in srgb, var(--muted) 35%, transparent);
  border-top-color: var(--accent);
  animation: thumb-spin 0.7s linear infinite;
}

.hero-artwork.is-loading .art-image {
  opacity: 0;
}

.hero-files-panel {
  display: flex;
  flex-direction: column;
  width: 100%;
  min-width: 0;
  min-height: 0;
  height: 100%;
  overflow: hidden;
}

.hero-files-panel[hidden] {
  display: none !important;
}

.hero-thumbs {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 4px 6px;
  align-content: start;
  flex: 1 1 auto;
  height: 100%;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 2px;
}

.hero-thumbs .hero-file-group {
  grid-column: 1 / -1;
}

.hero-file-group {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  width: 100%;
  margin: 0;
  padding: 8px 4px 6px;
  border: none;
  border-radius: 0;
  background: transparent;
  backdrop-filter: none;
  cursor: pointer;
  text-align: left;
  color: color-mix(in srgb, var(--muted) 48%, var(--ink));
  transition: color 180ms ease;
}

.hero-file-group:hover {
  color: var(--ink);
}

.hero-file-group-title {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: inherit;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.01em;
  line-height: 1.2;
  transition: color 180ms ease;
}

.hero-file-group-meta {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  flex: 0 0 auto;
  color: color-mix(in srgb, var(--muted) 92%, transparent);
  font-size: 12px;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
  line-height: 1.2;
  transition: color 180ms ease;
}

.hero-file-group-count::after {
  content: " 项";
}

.hero-file-group-chevron {
  width: 14px;
  height: 14px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: transform 180ms ease;
  opacity: 0.72;
}

.hero-file-group:hover .hero-file-group-meta,
.hero-file-group:hover .hero-file-group-title {
  color: inherit;
}

.hero-file-group:hover .hero-file-group-meta {
  color: var(--muted);
}

.hero-file-group:hover .hero-file-group-chevron {
  opacity: 1;
}

.hero-file-group.is-collapsed .hero-file-group-chevron {
  transform: rotate(-90deg);
}

.hero-file-item.is-group-collapsed {
  display: none;
}

.hero-file-item {
  flex: 0 0 auto;
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  gap: 5px;
  align-items: center;
  width: auto;
  min-width: 0;
  min-height: 36px;
  padding: 3px 5px;
  border: none;
  border-radius: 5px;
  background: transparent;
  overflow: hidden;
  box-shadow: none;
  cursor: pointer;
  text-align: left;
  transition: background-color 180ms ease, color 180ms ease;
  position: relative;
  color: color-mix(in srgb, var(--muted) 58%, var(--ink));
}

.hero-file-item.is-file,
.hero-file-item.is-design,
.hero-file-item.is-image {
  grid-template-columns: auto minmax(0, 1fr);
}

.hero-file-visual {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 auto;
  width: 36px;
  min-width: 36px;
}

.hero-file-item.is-loading {
  background: var(--soft-fill-hover);
}

.hero-file-item:hover {
  background: var(--soft-fill);
  color: var(--ink);
}

.hero-file-item.active {
  background: color-mix(in srgb, var(--accent) 12%, var(--surface));
  color: var(--ink);
}

.hero-file-item.active:hover {
  background: color-mix(in srgb, var(--accent) 16%, var(--surface));
}

.hero-file-item.is-image img {
  width: 40px;
  height: 28px;
  display: block;
  object-fit: contain;
  border-radius: 3px;
  background: var(--soft-fill);
}

.hero-file-item img.hero-thumb-lazy {
  opacity: 0;
}

.hero-file-badge {
  display: grid;
  place-items: center;
  width: 32px;
  height: 32px;
  border: 1px solid color-mix(in srgb, var(--line) 90%, transparent);
  border-radius: 5px;
  background: color-mix(in srgb, var(--surface-soft) 58%, var(--surface-raised));
  color: var(--muted);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.04em;
}

.design-file-icon {
  display: inline-grid;
  place-items: center;
  flex: 0 0 auto;
  width: 32px;
  height: 32px;
  border-radius: 6px;
  overflow: hidden;
}

.design-file-icon svg {
  width: 100%;
  height: 100%;
  display: block;
}

.design-file-icon--compact {
  width: 18px;
  height: 18px;
  border-radius: 4px;
}

.hero-file-name {
  min-width: 0;
  color: inherit;
  font-size: 11px;
  line-height: 1.25;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  transition: color 180ms ease;
}

.hero-thumb-spinner {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 12px;
  height: 12px;
  margin: -6px 0 0 -6px;
  border-radius: 50%;
  border: 2px solid color-mix(in srgb, var(--muted) 35%, transparent);
  border-top-color: var(--accent);
  animation: thumb-spin 0.7s linear infinite;
  pointer-events: none;
  z-index: 1;
}

.hero-file-item:not(.is-loading) .hero-thumb-spinner {
  display: none;
}

.hero-file-empty {
  padding: 12px 8px;
  color: var(--muted);
  font-size: 12px;
  text-align: center;
}

.art-image {
  display: block;
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  object-fit: contain;
  object-position: center;
  background: transparent;
}

.art-generated {
  width: min(560px, 100%);
  max-height: 100%;
  min-height: 0;
  display: grid;
  align-content: center;
  justify-content: center;
  gap: 14px;
  padding: 46px;
  background: transparent;
}

.art-generated h2 {
  margin: 0;
  max-width: 12em;
  font-size: clamp(26px, 3.8vw, 54px);
  font-weight: 520;
  letter-spacing: 0;
  line-height: 1.04;
}

.art-generated p {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
  overflow-wrap: anywhere;
}

.slideshow-stage.is-preview .hero-artwork {
  opacity: 0.88;
}

.project-kicker {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
  letter-spacing: 0.02em;
  line-height: 1.35;
}

.project-title {
  margin: 0;
  font-size: clamp(16px, 1.9vw, 22px);
  font-weight: 600;
  letter-spacing: 0;
  line-height: 1.12;
}

.project-detail {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 0;
  margin: 0;
  max-width: 100%;
}

.project-meta {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
  letter-spacing: 0.02em;
  line-height: 1.35;
}

.project-kicker:not(:empty) + .project-meta:not(:empty)::before {
  content: " · ";
}

.scan-overlay {
  position: absolute;
  left: 50%;
  top: 50%;
  z-index: 6;
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 260px;
  padding: 14px 16px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--surface-raised);
  box-shadow: var(--shadow-popover);
  opacity: 0;
  pointer-events: none;
  transform: translate(-50%, -45%) scale(0.98);
  transition: opacity 220ms ease, transform 220ms ease;
}

.scan-overlay.active {
  position: fixed;
  z-index: 20;
  opacity: 1;
  pointer-events: auto;
  transform: translate(-50%, -50%) scale(1);
}

.scan-overlay strong,
.scan-overlay span {
  display: block;
}

.scan-overlay strong {
  font-size: 13px;
}

.scan-overlay span {
  margin-top: 3px;
  color: var(--muted);
  font-size: 12px;
}

.scan-orbit {
  width: 30px;
  height: 30px;
  border: 1px solid var(--line-strong);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: scanSpin 900ms linear infinite;
}

.splitter {
  position: relative;
  cursor: row-resize;
}

.splitter::before {
  content: "";
  position: absolute;
  left: 28px;
  right: 28px;
  top: 50%;
  height: 1px;
  background: var(--line);
  transform: translateY(-50%);
}

.nav-arrow {
  position: relative;
  z-index: 4;
  top: auto;
  width: 32px;
  height: 32px;
  display: grid;
  place-items: center;
  padding: 0;
  border: 1px solid var(--line);
  border-radius: 50%;
  background: transparent;
  color: var(--muted);
  box-shadow: none;
  transform: none;
}

.nav-arrow-left {
  position: absolute;
  top: 50%;
  left: 8px;
  z-index: 4;
  transform: translateY(-50%);
}

.nav-arrow-right {
  position: absolute;
  top: 50%;
  right: 8px;
  z-index: 4;
  transform: translateY(-50%);
}

.nav-arrow svg {
  width: 14px;
  height: 14px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.nav-arrow:hover:not(:disabled) {
  border-color: var(--line-strong);
  color: var(--ink);
  background: var(--control-bg);
  box-shadow: var(--shadow-soft);
}

.nav-arrow-left:hover:not(:disabled),
.nav-arrow-right:hover:not(:disabled) {
  transform: translateY(-50%);
}

.nav-arrow-left:active:not(:disabled),
.nav-arrow-right:active:not(:disabled) {
  transform: translateY(calc(-50% + 1px));
}

.nav-arrow:disabled {
  opacity: 0.26;
  cursor: default;
  box-shadow: none;
}

.timeline-panel {
  display: grid;
  grid-template-rows: auto 1fr;
  min-height: 0;
  height: 100%;
  padding: 0 28px 16px;
  gap: 10px;
}

.timeline-body {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  align-items: stretch;
  gap: 0;
  min-height: 0;
  min-width: 0;
  overflow: visible;
}

.heatmap-panel {
  position: relative;
  flex: 0 0 auto;
  width: var(--heatmap-panel-width, 196px);
  min-width: 0;
  height: 100%;
  border: none;
  border-right: 1px solid var(--line);
  border-radius: 0;
  background: transparent;
  overflow: visible;
  transition: width 220ms cubic-bezier(0.22, 1, 0.36, 1), border-color 220ms ease;
}

.heatmap-panel.is-collapsed {
  --heatmap-panel-width: 0;
  border-right-color: transparent;
}

.heatmap-toggle {
  position: absolute;
  z-index: 3;
  top: 50%;
  right: -11px;
  display: grid;
  place-items: center;
  width: 22px;
  height: 22px;
  min-width: 22px;
  padding: 0;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--control-bg);
  color: var(--muted);
  cursor: pointer;
  box-shadow: none;
  transform: translateY(-50%);
  transition: color 180ms ease, border-color 180ms ease, background-color 180ms ease;
}

.heatmap-toggle svg {
  width: 12px;
  height: 12px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: transform 220ms cubic-bezier(0.22, 1, 0.36, 1);
}

.heatmap-panel.is-collapsed .heatmap-toggle svg {
  transform: rotate(180deg);
}

.heatmap-toggle:hover {
  color: var(--ink);
  border-color: var(--line-strong);
  background: var(--surface-raised);
  box-shadow: none;
  transform: translateY(-50%);
}

.heatmap-panel-body {
  display: flex;
  flex: 1 1 auto;
  flex-direction: column;
  width: 100%;
  min-width: 0;
  height: 100%;
  padding: 6px 14px 6px 6px;
  box-sizing: border-box;
}

.heatmap-panel.is-collapsed .heatmap-panel-body {
  display: none;
}

.heatmap {
  flex: 1 1 auto;
  min-height: 0;
  overflow: hidden;
}

.heatmap-calendar-single {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  min-height: 100%;
}

.heatmap-calendar-single .heatmap-month {
  margin-top: 0;
}

.heatmap-empty {
  display: grid;
  place-items: center;
  height: 100%;
  font-size: 11px;
  color: var(--muted);
}

.heatmap-calendar {
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding-bottom: 4px;
}

.heatmap-year + .heatmap-year {
  padding-top: 4px;
  border-top: 1px solid var(--line);
}

.heatmap-year-label {
  margin-bottom: 8px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.02em;
}

.heatmap-month + .heatmap-month {
  margin-top: 10px;
}

.heatmap-month-label {
  margin-bottom: 4px;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
}

.heatmap-month-weekdays,
.heatmap-month-grid {
  display: grid;
  grid-template-columns: repeat(7, var(--heatmap-cell, 20px));
  gap: 2px;
}

.heatmap-month-weekdays {
  margin-bottom: 10px;
}

.heatmap-month-weekdays span {
  display: grid;
  place-items: center;
  height: 14px;
  color: var(--muted);
  font-size: 10px;
}

.heatmap-month-grid {
  width: max-content;
}

.heatmap-cell-spacer {
  width: var(--heatmap-cell, 20px);
  height: var(--heatmap-cell, 20px);
}

.heatmap-cell {
  display: grid;
  place-items: center;
  width: var(--heatmap-cell, 20px);
  height: var(--heatmap-cell, 20px);
  padding: 0;
  border: 1px solid transparent;
  border-radius: 3px;
  background: var(--heatmap-level-empty);
  color: var(--ink);
  font-size: 9px;
  line-height: 1;
  cursor: default;
}

.heatmap-cell.is-muted {
  color: color-mix(in srgb, var(--muted) 88%, var(--ink));
}

.heatmap-cell.is-today {
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 70%, transparent);
}

.heatmap-cell:hover,
.heatmap-cell.is-hover {
  border-color: color-mix(in srgb, var(--accent) 55%, transparent);
  transform: scale(1.06);
}

.heatmap-cell.level-1,
.heatmap-cell.level-2,
.heatmap-cell.level-3,
.heatmap-cell.level-4 {
  cursor: pointer;
  font-weight: 600;
}

.heatmap-cell.level-1 {
  background: color-mix(in srgb, var(--accent) 16%, transparent);
  color: var(--ink);
}

.heatmap-cell.level-2 {
  background: color-mix(in srgb, var(--accent) 28%, transparent);
  color: var(--ink);
}

.heatmap-cell.level-3 {
  background: color-mix(in srgb, var(--accent) 42%, transparent);
  color: var(--ink);
}

.heatmap-cell.level-4 {
  background: color-mix(in srgb, var(--accent) 58%, transparent);
  color: var(--on-accent);
}

.heatmap-cell:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 1px;
}

.heatmap-tooltip {
  position: fixed;
  z-index: 30;
  max-width: min(320px, calc(100vw - 24px));
  padding: 10px 12px;
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  background: var(--surface);
  color: var(--ink);
  box-shadow: var(--shadow);
  pointer-events: none;
  font-size: 12px;
  line-height: 1.45;
}

.heatmap-tooltip-date {
  margin-bottom: 6px;
  font-weight: 600;
}

.heatmap-tooltip-count {
  margin-bottom: 8px;
  color: var(--muted);
  font-size: 11px;
}

.heatmap-tooltip-list {
  margin: 0;
  padding: 0;
  list-style: none;
}

.heatmap-tooltip-list li + li {
  margin-top: 4px;
}

.heatmap-tooltip-list li {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.heatmap-tooltip-more {
  margin-top: 6px;
  color: var(--muted);
  font-size: 11px;
}

.timeline-top {
  position: relative;
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) minmax(0, auto);
  align-items: start;
  gap: 12px 16px;
  min-height: var(--project-info-height);
  padding-top: 4px;
}

.timeline-period-filter {
  grid-column: 1;
  grid-row: 1;
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 6px;
  align-self: center;
}

.timeline-period-select {
  height: 32px;
  padding: 0 28px 0 12px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--control-bg);
  color: var(--ink);
  font-size: 14px;
  cursor: pointer;
  box-shadow: none;
  appearance: none;
  background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%);
  background-position: calc(100% - 14px) calc(50% - 2px), calc(100% - 9px) calc(50% - 2px);
  background-size: 5px 5px, 5px 5px;
  background-repeat: no-repeat;
}

.timeline-period-select:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

.timeline-period-select:focus-visible {
  outline: 2px solid color-mix(in srgb, var(--accent) 45%, transparent);
  outline-offset: 1px;
}

#timelineYearSelect {
  min-width: 92px;
}

#timelineMonthSelect {
  min-width: 76px;
}

.project-info {
  grid-column: 2;
  grid-row: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: var(--project-info-height);
  padding: 0 12px 2px;
  text-align: center;
  pointer-events: none;
  box-sizing: border-box;
}

.project-info:not(.is-ready) {
  visibility: hidden;
}

.timeline-header {
  position: relative;
  z-index: 2;
  grid-column: 3;
  grid-row: 1;
  justify-self: end;
  align-self: center;
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  color: var(--ink);
  pointer-events: auto;
}

.timeline-tools {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  flex-wrap: wrap;
  gap: 6px;
  max-width: min(100%, 520px);
}

.timeline-tools .timeline-period-select {
  max-width: 118px;
  height: 32px;
  box-sizing: border-box;
  padding: 0 26px 0 11px;
  font-size: 12px;
  line-height: 30px;
  color: var(--muted);
}

.timeline-tools .timeline-period-select:hover {
  color: color-mix(in srgb, var(--muted) 42%, var(--ink));
}

.timeline-tools .timeline-period-select:focus-visible {
  color: color-mix(in srgb, var(--muted) 28%, var(--ink));
}

#scopeFilterSelect,
#sizeFilterSelect {
  min-width: 118px;
}

.ext-filter {
  position: relative;
}

.ext-filter-trigger {
  display: inline-flex;
  align-items: center;
  justify-content: flex-start;
  width: 100%;
  min-width: 118px;
  max-width: 118px;
  height: 32px;
  box-sizing: border-box;
  line-height: 1.2;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  text-align: left;
}

.ext-filter.is-open .ext-filter-trigger {
  border-color: var(--line-strong);
  color: color-mix(in srgb, var(--muted) 28%, var(--ink));
}

.timeline-tool-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 0 14px;
  background-image: none;
  cursor: pointer;
  color: var(--ink);
}

.timeline-tool-button svg {
  width: 14px;
  height: 14px;
  flex: 0 0 auto;
}

.timeline-tool-button:hover {
  border-color: var(--line-strong);
}

.timeline-tool-button:focus-visible {
  outline: 2px solid color-mix(in srgb, var(--accent) 45%, transparent);
  outline-offset: 1px;
}

.ext-filter-panel {
  position: absolute;
  right: 0;
  bottom: calc(100% + 6px);
  z-index: 30;
  display: none;
  min-width: 220px;
  max-width: min(300px, calc(100vw - 56px));
  padding: 4px 5px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--surface-raised);
  box-shadow: var(--shadow-soft);
}

.ext-filter.is-open .ext-filter-panel {
  display: block;
}

.ext-filter-special {
  display: flex;
  flex-direction: column;
  gap: 0;
  padding-bottom: 4px;
  margin-bottom: 4px;
  border-bottom: 1px solid var(--line);
}

.ext-filter-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 0 6px;
  max-height: 200px;
  overflow-y: auto;
}

.ext-filter-option {
  display: flex;
  align-items: center;
  gap: 4px;
  min-width: 0;
  min-height: 22px;
  padding: 1px 4px;
  border-radius: 4px;
  color: var(--ink);
  font-size: 12px;
  line-height: 1.2;
  cursor: pointer;
  user-select: none;
}

.ext-filter-option:hover {
  background: var(--soft-fill-strong);
}

.ext-filter-option span {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.ext-filter-option input {
  margin: 0;
  flex: 0 0 auto;
  width: 13px;
  height: 13px;
  accent-color: var(--accent);
}

.timeline-tools .timeline-period-select:hover,
.timeline-tools .timeline-tool-button:hover {
  border-color: var(--line-strong);
}

.timeline-tools button:hover {
  border-color: var(--line-strong);
  box-shadow: none;
  transform: none;
}

.timeline {
  position: relative;
  min-height: 0;
  min-width: 0;
  overflow: hidden;
  cursor: grab;
  touch-action: none;
}

.timeline-card {
  position: absolute;
  top: 52px;
  width: var(--card-width, 156px);
  height: var(--card-height, 140px);
  min-width: 0;
  border: none;
  border-radius: 8px;
  background: transparent;
  text-align: left;
  cursor: pointer;
  pointer-events: auto;
  opacity: 1;
  overflow: hidden;
  transition:
    width 220ms cubic-bezier(0.22, 1, 0.36, 1),
    height 220ms cubic-bezier(0.22, 1, 0.36, 1),
    top 220ms cubic-bezier(0.22, 1, 0.36, 1),
    transform 220ms cubic-bezier(0.22, 1, 0.36, 1),
    background-color 220ms ease,
    z-index 0ms;
}

.timeline.is-scaling .timeline-card,
.timeline.is-scaling .thumb {
  transition: none;
}

.timeline-card.is-narrow .thumb {
  height: var(--thumb-height, 88px);
}

.timeline-card.is-narrow .thumb-meta {
  margin-top: 6px;
  min-width: 0;
}

.timeline-card.is-narrow .thumb-title {
  font-size: 11px;
}

.timeline-card.is-narrow .thumb-date {
  margin-top: 2px;
  font-size: 11px;
}

.timeline-card.is-narrow .timeline-folder-action {
  top: 4px;
  right: 4px;
  width: 22px;
  height: 22px;
}

.timeline-card.is-narrow .timeline-folder-action svg {
  width: 12px;
  height: 12px;
}

.timeline-card.is-minimal {
  border-radius: 3px;
}

.timeline-card.is-minimal .thumb {
  height: var(--thumb-height, 8px);
  border-radius: 3px;
}

.timeline-card.is-minimal .thumb-meta {
  display: none;
}

.timeline-card.is-minimal .timeline-folder-action {
  display: none;
}

.timeline-card.is-minimal:hover {
  transform: none;
}

.timeline.dragging {
  cursor: grabbing;
}

.timeline-track {
  position: absolute;
  inset: 0;
  transition: transform 280ms cubic-bezier(0.22, 1, 0.36, 1);
  will-change: transform;
}

.timeline-track.is-dragging {
  transition: none;
}

.timeline-card:hover,
.timeline-card.is-preview {
  background: transparent;
}

.timeline-card.is-preview {
  z-index: 180;
}

.timeline-card.active {
  background: transparent;
  box-shadow: none;
  transform: none;
  z-index: 160;
}

.timeline-card.active:hover,
.timeline-card.active.is-preview {
  background: transparent;
}

.timeline-card.active .thumb-title {
  color: var(--accent);
  font-weight: 600;
}

.timeline-card.active::before {
  content: "";
  position: absolute;
  left: 50%;
  top: -18px;
  width: 2px;
  height: 24px;
  background: var(--accent);

    if (numFull) {
